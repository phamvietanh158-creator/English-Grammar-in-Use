<meta charset="UTF-8">

<title>English Grammar in Use – Raymond Murphy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e5e3de;
  --text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;
  --accent-bg:#eef4fb;--accent-border:#b8d4ee;
  --done-bg:#eefaf4;--done-border:#a8ddc2;--done-text:#1a6b42;
  --radius:10px;--font:system-ui,-apple-system,sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.5rem 2rem;position:sticky;top:0;z-index:10}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.book-title{font-size:17px;font-weight:600;color:var(--text)}
.book-sub{font-size:13px;color:var(--muted);margin-top:2px}
.stats{display:flex;gap:1rem;font-size:13px;color:var(--muted)}
.stat{display:flex;align-items:center;gap:5px}
.stat-num{font-weight:600;color:var(--text)}

.main{max-width:960px;margin:0 auto;padding:2rem}

.search-bar{position:relative;margin-bottom:1.5rem}
.search-bar input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

.section{margin-bottom:2rem}
.section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}

.unit-card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;text-decoration:none;color:var(--text);transition:border-color .15s,background .15s;cursor:pointer;position:relative}
.unit-card:hover{border-color:var(--accent);background:var(--accent-bg)}
.unit-card.done{background:var(--done-bg);border-color:var(--done-border)}
.unit-num{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px}
.unit-title{font-size:13px;line-height:1.45;color:var(--text)}
.unit-card.done .unit-title{color:var(--done-text)}
.check-badge{position:absolute;top:8px;right:8px;width:16px;height:16px;background:var(--done-text);border-radius:50%;display:none;align-items:center;justify-content:center}
.unit-card.done .check-badge{display:flex}
.check-badge svg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none}
.unit-card.unavailable{opacity:.45;cursor:default;pointer-events:none}
.unit-card.available{border-color:var(--accent-border);background:var(--accent-bg)}
.available-tag{font-size:10px;color:var(--accent);font-weight:600;margin-top:5px}

.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.25rem}
.progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.progress-label{font-size:13px;color:var(--muted);white-space:nowrap}

footer{text-align:center;padding:2rem;font-size:12px;color:var(--muted)}

.hidden{display:none!important}
</style>
</head>

</header>

const STORAGE_KEY = 'egiu_done';
function getDone(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}}
function setDone(arr){localStorage.setItem(STORAGE_KEY,JSON.stringify(arr))}
function markDone(id){const d=getDone();if(!d.includes(id)){d.push(id);setDone(d)}updateStats();renderAll()}

let done = getDone();

function updateStats(){
  done = getDone();
  const n = done.length;
  const pct = Math.round(n/145*100);
  document.getElementById('doneCount').textContent = n;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct+'% hoàn thành';
  document.getElementById('availCount').textContent = UNITS.filter(u=>u.avail).length;
}

function renderAll(filter=''){
  const sections = {};
  UNITS.forEach(u=>{
    if(filter && !u.t.toLowerCase().includes(filter) && !String(u.id).includes(filter)) return;
    if(!sections[u.s]) sections[u.s]=[];
    sections[u.s].push(u);
  });

  const container = document.getElementById('sections');
  container.innerHTML = '';
  for(const [sec, units] of Object.entries(sections)){
    const div = document.createElement('div');
    div.className='section';
    div.innerHTML = `<div class="section-title">${sec}</div><div class="grid">${
      units.map(u=>{
        const isDone = done.includes(u.id);
        const cls = u.avail ? 'unit-card available' : isDone ? 'unit-card done' : 'unit-card unavailable';
        const href = u.avail ? `href="${u.file}"` : '';
        const tag = u.avail ? '<div class="available-tag">▶ Có sẵn</div>' : '';
        return `<a ${href} class="${cls}" ${u.avail?'':'title="Chưa có bài này"'}>
          <div class="unit-num">Unit ${u.id}</div>
          <div class="unit-title">${u.t}</div>
          ${tag}
          <div class="check-badge"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        </a>`;
      }).join('')
    }</div>`;
    container.appendChild(div);
  }
}
