<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Unit 7 – Present Perfect 1 (I have done)</title>
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.nb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}
.nt{font-size:14px;font-weight:600}.ns{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.tb{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.th{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.thl{font-size:14px;font-weight:600;color:var(--accent-text)}
.td{padding:0 1.25rem 1.25rem;display:none}.td.open{display:block}
.td h3{font-size:14px;font-weight:600;color:var(--accent-text);margin:1rem 0 .4rem}.td p{font-size:14px;margin-bottom:.5rem}
.eg{background:var(--surface);border-left:3px solid var(--accent);padding:.4rem .8rem;border-radius:0 var(--radius) var(--radius) 0;font-size:13.5px;margin:.3rem 0}
.eg em{color:var(--muted);font-size:12px;font-style:normal}
.sb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);margin-top:.5rem}
.sb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.eb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.eh{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.75rem}
.ebg{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--accent-border);white-space:nowrap;margin-top:1px}
.etl{font-size:14px;font-weight:600}.ei{font-size:13px;color:var(--muted);margin-top:3px}
.ebody{padding:1rem 1.25rem}
.it{padding:.75rem 0;border-bottom:1px solid var(--border)}.it:last-child{border-bottom:none;padding-bottom:0}
.in{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}.is{font-size:14.5px;line-height:1.65}
.fi{border:none;border-bottom:2px solid var(--accent-border);background:transparent;color:var(--text);font-size:14.5px;font-family:var(--font);padding:1px 4px;width:200px;outline:none;transition:border-color .2s;vertical-align:middle}
.fi:focus{border-bottom-color:var(--accent)}.fi.ok{border-bottom-color:var(--ok);color:var(--ok);font-weight:600}.fi.ng{border-bottom-color:var(--ng);color:var(--ng)}
.fb{margin-top:.5rem;font-size:13px;display:none;gap:6px;align-items:flex-start}.fb.show{display:flex}
.fb-i{font-size:15px;flex-shrink:0}.fb.ok .fb-b{color:#1a6b42}.fb.ng .fb-b{color:#991b1b}
.fb-a{font-weight:600;margin-bottom:2px}.fb-e{color:var(--muted);font-size:12px}
.acts{display:flex;gap:.75rem;margin:1.5rem 0 1rem}
.bck{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}.bck:hover{opacity:.85}
.brs{padding:9px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:var(--font)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;display:none}.sc.show{display:block}
.sp{font-size:48px;font-weight:700;color:var(--accent)}.sm{font-size:14px;color:var(--muted);margin-top:4px}.ss{font-size:32px;margin:.75rem 0}
.sr{display:flex;justify-content:center;gap:2rem;margin-top:.75rem}
.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:var(--muted)}.ok-c{color:var(--ok)}.ng-c{color:var(--ng)}
.dn{background:#eefaf4;border:1px solid #a8ddc2;border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:#1a6b42;margin-top:.75rem;display:none}
.ft{width:100%;border-collapse:collapse;font-size:13.5px;margin:.5rem 0}
.ft th{background:var(--accent-bg);padding:6px 10px;text-align:left;font-weight:600;border:1px solid var(--accent-border);color:var(--accent-text)}
.ft td{padding:6px 10px;border:1px solid var(--border)}
</style></head><body>
<nav><a href="index.html" class="nb">← Trang chủ</a><div class="nt">Unit 7 · Present Perfect 1 (I have done)</div><div class="ns">4 exercises · 27 items</div></nav>
<div class="wrap" id="app"></div>
<script>
const UNIT=7;
const DATA={
theory:{
  title:'Present Perfect 1: have/has + past participle',
  sections:[
    {h:'A · Công thức',items:['I/we/you/they <strong>have (\'ve)</strong> + V3: I\'ve finished / We\'ve lost','he/she/it <strong>has (\'s)</strong> + V3: She\'s gone / It\'s stopped','Phủ định: <strong>haven\'t / hasn\'t</strong> + V3','Nghi vấn: <strong>Have/Has</strong> + S + V3?']},
    {h:'B · Khi nào dùng?',items:['Hành động trong quá khứ có <strong>kết quả ở hiện tại</strong>:','Tom <strong>has lost</strong> his key. <em>(= he doesn\'t have it now)</em>','I <strong>\'ve forgotten</strong> his name. <em>(= I can\'t remember it now)</em>','Sally <strong>hasn\'t gone</strong> out. <em>(= she is here now)</em>']},
    {h:'C · just / already / yet',items:['<strong>just</strong> = vừa mới: I\'ve <strong>just</strong> had lunch.','<strong>already</strong> = sớm hơn mong đợi: I\'ve <strong>already</strong> paid it.','<strong>yet</strong> = chưa (phủ định) / chưa à? (câu hỏi): I haven\'t sent it <strong>yet</strong>. / Has it stopped <strong>yet</strong>?']},
    {h:'D · gone to vs been to',items:['<strong>has gone to</strong> = đã đi và còn ở đó: He\'s gone to Italy. <em>(= he\'s there now)</em>','<strong>has been to</strong> = đã đến và quay về: She\'s been to Italy. <em>(= she\'s back now)</em>']},
  ],
  eg:['Ow! I\'ve cut my finger.','The road is closed. There\'s been an accident.','Have you seen my bag? I can\'t find it.']
},
exs:[
  {id:'71',title:'Complete using Present Perfect',instr:'Dùng các động từ: break · disappear · go up · grow · improve · lose · shrink · stop',
   items:[
    {id:'a',pre:'1 Tom is looking for his key.',suf:'',ans:'Tom has lost his key.',exp:'lose → has lost (kết quả: không có chìa)'},
    {id:'b',pre:"2 Maria's English wasn't very good. Now it is better.",suf:'',ans:'Her English has improved.',exp:'improve → has improved'},
    {id:'c',pre:'3 My bag was here, but it isn\'t here any more.',suf:'',ans:'My bag has disappeared.',exp:'disappear → has disappeared'},
    {id:'d',pre:"4 Lisa can't walk and her leg is in plaster.",suf:'',ans:'Lisa has broken her leg.',exp:'break → has broken'},
    {id:'e',pre:'5 Last week the bus fare was £1.80. Now it is £2.',suf:'',ans:'The bus fare has gone up.',exp:'go up → has gone up'},
    {id:'f',pre:'6 Dan didn\'t have a beard before. Now he has one.',suf:'',ans:'Dan has grown a beard.',exp:'grow → has grown'},
    {id:'g',pre:'7 It was raining ten minutes ago. It isn\'t now.',suf:'',ans:'It has stopped raining.',exp:'stop → has stopped'},
    {id:'h',pre:"8 I washed my sweater, and now it's too small for me.",suf:'',ans:'My sweater has shrunk.',exp:'shrink → has shrunk'},
  ],type:'full'},
  {id:'72',title:'Put in been or gone',instr:'been = đã đến rồi về / gone = đã đi và còn đó',
   items:[
    {id:'i',pre:"1 My parents are on holiday. They've",suf:'to Italy.',ans:'gone',exp:'Còn ở Italy → gone to'},
    {id:'j',pre:"2 Hello! I've just",suf:"to the shops. I've bought lots of things.",ans:'been',exp:'Đã về rồi → been to'},
    {id:'k',pre:'3 Tom has just',suf:'out. He\'ll be back in about an hour.',ans:'gone',exp:'Đã ra ngoài, chưa về → gone'},
    {id:'l',pre:"4 Alice isn't here. I don't know where she's",suf:'.',ans:'gone',exp:'Không có ở đây → gone'},
    {id:'m',pre:"5 You're very late. Where have you",suf:'?',ans:'been',exp:'Hỏi đã đi đâu về → been'},
  ],type:'fill'},
  {id:'73',title:'Complete using Present Perfect',instr:'Khẳng định hoặc phủ định',
   items:[
    {id:'n',pre:'1 Sally is still here.',suf:'out.',ans:"She hasn't gone",exp:"Phủ định: still here → hasn't gone"},
    {id:'o',pre:"2 I can't find my bag.",suf:'anywhere?',ans:'Have you seen it',exp:'Câu hỏi: Have + you + seen?'},
    {id:'p',pre:"3 I can't log on.",suf:'my password.',ans:"I've forgotten",exp:"Kết quả hiện tại → I've forgotten"},
    {id:'q',pre:'4 I sent Joe an email, but',suf:'.',ans:"he hasn't replied",exp:"Phủ định: hasn't replied"},
    {id:'r',pre:"5 Is the meeting still on, or",suf:'?',ans:'has it finished',exp:'Câu hỏi: has + it + finished?'},
    {id:'s',pre:'6',suf:". It's colder now.",ans:'The weather has changed',exp:'Kết quả: it\'s colder → has changed'},
    {id:'t',pre:'7',suf:'. Could you sign it now?',ans:"You haven't signed the form",exp:'Phủ định: chưa ký'},
  ],type:'full'},
  {id:'74',title:'Write sentences with just, already or yet',instr:'Chọn just / already / yet đúng ngữ cảnh',
   items:[
    {id:'u',pre:"1 'Would you like something to eat?'",suf:'',ans:"No thank you. I've just had lunch.",exp:'"just" = vừa ăn xong'},
    {id:'v',pre:"2 'Can I speak to Joe?'",suf:'(go out)',ans:"I'm afraid he's just gone out.",exp:'"just" = vừa ra ngoài'},
    {id:'w',pre:"3 The waiter starts to take your plate.",suf:'(not/finish)',ans:"Wait! I haven't finished yet.",exp:'"yet" trong câu phủ định'},
    {id:'x',pre:"4 'Shall I phone to reserve a table?'",suf:'(do it)',ans:"No, I've already done it.",exp:'"already" = đã làm rồi'},
    {id:'y',pre:'5 You ask Lisa:',suf:'a place to live? (find)',ans:'Have you found a place yet?',exp:'"yet" trong câu hỏi'},
    {id:'z',pre:"6 'Where are you going for holiday?'",suf:'(not/decide)',ans:"I haven't decided yet.",exp:'"yet" = chưa quyết định'},
  ],type:'full'},
]};
function norm(s){return s.trim().toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' ')}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  const fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'✓':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  const t=DATA.theory;
  return `<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">📖 Lý thuyết: ${t.title}</span>
  <svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div>
  <div class="td open" id="tB">${t.sections.map(s=>`<h3>${s.h}</h3>${s.items.map(i=>`<div class="eg">${i}</div>`).join('')}`).join('')}
  <h3>Ví dụ từ sách</h3>${t.eg.map(e=>`<div class="eg">${e}</div>`).join('')}
  <button class="sb" onclick="speak('${t.eg.join(' ')}')">🔊 Nghe ví dụ</button></div></div>`;
}
function renderEx(ex){
  const items=ex.items.map((it,i)=>{
    const inp=ex.type==='fill'?`<input class="fi" id="inp-${it.id}" placeholder="…" autocomplete="off">`:`<input class="fi" id="inp-${it.id}" placeholder="Write full sentence…" style="width:100%;max-width:480px" autocomplete="off">`;
    return `<div class="it" id="card-${it.id}"><div class="in">${i+1}${it.hint?` <span style="font-size:11px;color:var(--muted)">${it.hint}</span>`:''}</div>
    <div class="is">${it.pre?it.pre+' ':''} ${inp} ${it.suf||''}</div>
    <div class="fb" id="fb-${it.id}"><span class="fb-i" id="fi-${it.id}"></span><div class="fb-b"><div class="fb-a" id="fa-${it.id}"></div><div class="fb-e" id="fe-${it.id}"></div></div></div></div>`;
  }).join('');
  return `<div class="eb"><div class="eh"><span class="ebg">${ex.id}</span><div><div class="etl">${ex.title}</div><div class="ei">${ex.instr}</div></div></div><div class="ebody">${items}</div></div>`;
}
function renderScore(){
  return `<div class="acts"><button class="bck" onclick="checkAll()">Chấm điểm</button><button class="brs" onclick="resetAll()">Làm lại</button></div>
  <div class="sc" id="sc"><div class="sp" id="sp">—</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div>
  <div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">Đúng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">Tổng</div></div></div>
  <div class="dn" id="dn">✓ Đã lưu tiến độ Unit ${UNIT}!</div>
  <div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">Làm lại</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">← Về trang chủ</a></div></div>`;
}
function build(){
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+renderScore();
}
function checkAll(){
  let ok=0,total=0;
  DATA.exs.forEach(ex=>ex.items.forEach(it=>{
    total++;const v=norm(document.getElementById('inp-'+it.id).value);const a=norm(it.ans);
    const vars=[a,a.replace("haven't","have not"),a.replace("hasn't","has not"),a.replace("'ve"," have"),a.replace("'s"," has")];
    const correct=vars.some(x=>v===x);if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  }));
  const pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';document.getElementById('so').textContent=ok;document.getElementById('sng').textContent=total-ok;document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Ôn lại just/already/yet nhé!';
  document.getElementById('sc').className='sc show';
  try{const d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&!d.includes(UNIT)){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){const b=document.getElementById('tB');const a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();
</script></body></html>
