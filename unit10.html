<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Unit 10 – Present Perfect Continuous and Simple</title>
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.nb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}.nt{font-size:14px;font-weight:600}.ns{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}.tb{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.th{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}.thl{font-size:14px;font-weight:600;color:var(--accent-text)}
.td{padding:0 1.25rem 1.25rem;display:none}.td.open{display:block}.td h3{font-size:14px;font-weight:600;color:var(--accent-text);margin:1rem 0 .4rem}.td p{font-size:14px;margin-bottom:.5rem}
.eg{background:var(--surface);border-left:3px solid var(--accent);padding:.4rem .8rem;border-radius:0 var(--radius) var(--radius) 0;font-size:13.5px;margin:.3rem 0}.eg em{color:var(--muted);font-size:12px;font-style:normal}
.sb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);margin-top:.5rem}.sb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.eb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}.eh{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.75rem}
.ebg{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--accent-border);white-space:nowrap;margin-top:1px}.etl{font-size:14px;font-weight:600}.ei{font-size:13px;color:var(--muted);margin-top:3px}.ebody{padding:1rem 1.25rem}
.it{padding:.75rem 0;border-bottom:1px solid var(--border)}.it:last-child{border-bottom:none;padding-bottom:0}.in{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}.is{font-size:14.5px;line-height:1.65}
.fi{border:none;border-bottom:2px solid var(--accent-border);background:transparent;color:var(--text);font-size:14.5px;font-family:var(--font);padding:1px 4px;width:220px;outline:none;transition:border-color .2s;vertical-align:middle}
.fi:focus{border-bottom-color:var(--accent)}.fi.ok{border-bottom-color:var(--ok);color:var(--ok);font-weight:600}.fi.ng{border-bottom-color:var(--ng);color:var(--ng)}
.fb{margin-top:.5rem;font-size:13px;display:none;gap:6px;align-items:flex-start}.fb.show{display:flex}.fb-i{font-size:15px;flex-shrink:0}.fb.ok .fb-b{color:#1a6b42}.fb.ng .fb-b{color:#991b1b}.fb-a{font-weight:600;margin-bottom:2px}.fb-e{color:var(--muted);font-size:12px}
.acts{display:flex;gap:.75rem;margin:1.5rem 0 1rem}.bck{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}.bck:hover{opacity:.85}
.brs{padding:9px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:var(--font)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;display:none}.sc.show{display:block}
.sp{font-size:48px;font-weight:700;color:var(--accent)}.sm{font-size:14px;color:var(--muted);margin-top:4px}.ss{font-size:32px;margin:.75rem 0}.sr{display:flex;justify-content:center;gap:2rem;margin-top:.75rem}
.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:var(--muted)}.ok-c{color:var(--ok)}.ng-c{color:var(--ng)}
.dn{background:#eefaf4;border:1px solid #a8ddc2;border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:#1a6b42;margin-top:.75rem;display:none}
</style></head><body>
<nav><a href="index.html" class="nb">← Trang chủ</a><div class="nt">Unit 10 · Present Perfect Continuous and Simple</div><div class="ns">3 exercises · 22 items</div></nav>
<div class="wrap" id="app"></div>
<script>
const UNIT=10;
const DATA={
theory:{title:"Present Perfect Continuous vs Simple — how long / how much",
sections:[
  {h:"A · Continuous → quá trình (how long), Simple → kết quả (how much/many)",items:["<strong>She has been painting</strong> her bedroom. <em>(quá trình, có thể chưa xong)</em>","<strong>She has painted</strong> her bedroom. <em>(xong rồi, kết quả quan trọng)</em>","My hands are dirty. I've <strong>been repairing</strong> my bike. <em>(quá trình)</em>","My bike is OK now. I've <strong>repaired</strong> it. <em>(hoàn thành)</em>"]},
  {h:"B · How long → thường dùng Continuous",items:["<strong>How long have you been reading</strong> that book? <em>(vẫn đang đọc)</em>","They've <strong>been playing</strong> tennis since 2 o'clock. <em>(vẫn đang chơi)</em>","I'm learning Arabic, but I haven't <strong>been learning</strong> it very long."]},
  {h:"C · How many / how much → dùng Simple",items:["<strong>How many pages have you read</strong>? <em>(đếm được)</em>","Amy <strong>has sent</strong> lots of emails this morning. <em>(số lượng)</em>","They've <strong>played</strong> tennis three times this week. <em>(số lần)</em>"]},
  {h:"D · Stative verbs → chỉ dùng Simple",items:["I've <strong>known</strong> about the problem for a long time. <em>(not 'been knowing')</em>","How long have you <strong>had</strong> that camera? <em>(not 'been having')</em>"]},
],eg:["She has been painting her bedroom.","She has painted her bedroom — it is yellow now.","How long have you been reading that book?"]},
exs:[
  {id:"10.1",title:"Present perfect continuous or simple?",instr:"Đọc tình huống → chọn dạng đúng",type:"fill",items:[
    {id:"a101",pre:"1 Tom has been reading for 2 hours and is on page 53. He",suf:"for two hours. (read)",ans:"has been reading",exp:"Đang đọc, chưa xong → Continuous"},
    {id:"b101",pre:"1b He",suf:"53 pages so far. (read)",ans:"has read",exp:"53 trang = số lượng đã đọc → Simple"},
    {id:"c101",pre:"2 Rachel has been travelling for 3 months. She",suf:"for three months. (travel)",ans:"has been travelling",exp:"Đang đi, vẫn tiếp diễn → Continuous"},
    {id:"d101",pre:"2b She",suf:"six countries so far. (visit)",ans:"has visited",exp:"6 nước = số lượng đã thăm → Simple"},
    {id:"e101",pre:"3 Patrick won the championship for the fourth time. He",suf="the national championship four times. (win)",ans:"has won",exp:"4 lần = số lần → Simple"},
    {id:"f101",pre:"3b He",suf:"since he was ten. (play)",ans:"has been playing",exp:"Từ năm 10 tuổi, vẫn đang chơi → Continuous"},
    {id:"g101",pre:"4 Lisa and Sue still make films. They",suf:"films since they left college. (make)",ans:"have been making",exp:"Vẫn đang làm → Continuous"},
    {id:"h101",pre:"4b They",suf:"five films since they left college. (make)",ans:"have made",exp:"5 bộ phim = số lượng → Simple"},
  ]},
  {id:"10.2",title:"Write questions — simple or continuous?",instr:"Đặt câu hỏi: how long → Continuous; how many → Simple",type:"full",items:[
    {id:"i102",pre:"1 Your friend is learning Arabic.",suf:"",ans:"How long have you been learning Arabic?",exp:"how long → Continuous"},
    {id:"j102",pre:"2 Your friend is waiting for you.",suf:"",ans:"Have you been waiting long?",exp:"waiting → Continuous"},
    {id:"k102",pre:"3 Somebody is fishing.",suf:"",ans:"Have you caught any fish?",exp:"số lượng → Simple: caught"},
    {id:"l102",pre:"4 Friends are having a party next week.",suf:"",ans:"How many people have you invited?",exp:"how many → Simple"},
    {id:"m102",pre:"5 A friend is a teacher.",suf:"",ans:"How long have you been teaching?",exp:"how long → Continuous"},
  ]},
  {id:"10.3",title:"Present perfect simple or continuous?",instr:"Chọn dạng phù hợp với ngữ cảnh",type:"fill",items:[
    {id:"n103",pre:"1 Where have you been?",suf:"tennis?",ans:"Have you been playing",exp:"Hỏi quá trình → Continuous"},
    {id:"o103",pre:"2 Look! Somebody",suf:"that window.",ans:"has broken",exp:"Kết quả: cửa sổ vỡ → Simple"},
    {id:"p103",pre:"3 You look tired.",suf:"hard?",ans:"Have you been working",exp:"Hỏi quá trình → Continuous"},
    {id:"q103",pre:"4",suf:"in a factory?",ans:"Have you ever worked",exp:"ever + trải nghiệm → Simple"},
    {id:"r103",pre:"5 Where's Lisa? Where",suf:"?",ans:"has she gone",exp:"Kết quả hiện tại → Simple: has gone"},
    {id:"s103",pre:"6 This is a very old book. I",suf:"it since I was a child.",ans:"have had",exp:"have (stative) → Simple: have had"},
    {id:"t103",pre:"7 I",suf:"TV.",ans:"have been watching",exp:"Quá trình vừa dừng → Continuous"},
    {id:"u103",pre:"8 My brother is an actor. He",suf:"in several films.",ans:"has appeared",exp:"Số lượng → Simple: has appeared"},
    {id:"v103",pre:"9 That's all right. I",suf:"long.",ans:"haven't been waiting",exp:"Phủ định Continuous: haven't been waiting"},
    {id:"w103",pre:"10 You look as if",suf:".",ans:"you have been crying",exp:"Dấu hiệu vừa khóc → Continuous"},
    {id:"x103",pre:"11 Is it still raining? No, it",suf:".",ans:"has stopped",exp:"Kết quả: đã dừng → Simple"},
    {id:"y103",pre:"12 The children are tired. They",suf:"in the garden.",ans:"have been playing",exp:"Quá trình → Continuous"},
    {id:"z103",pre:"13 I",suf:"my phone.",ans:"have lost",exp:"Kết quả: mất rồi → Simple"},
    {id:"aa103",pre:"14 I",suf:"the book you lent me, but I haven't finished it.",ans:"have been reading",exp:"Đang đọc dở → Continuous"},
    {id:"ab103",pre:"15 I",suf:"the book you lent me, so you can have it back.",ans:"have read",exp:"Đọc xong rồi → Simple"},
  ]},
]};

function norm(s){return s.trim().toLowerCase().replace(/['\u2019]/g,"'").replace(/\s+/g,' ')}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  const fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'✓':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  const t=DATA.theory;
  const secs=t.sections.map(s=>'<h3>'+s.h+'</h3>'+s.items.map(i=>'<div class="eg">'+i+'</div>').join('')).join('');
  return '<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">📖 Lý thuyết: '+t.title+'</span><svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div><div class="td open" id="tB">'+secs+'<h3>Ví dụ từ sách</h3>'+t.eg.map(e=>'<div class="eg">'+e+'</div>').join('')+'<button class="sb" onclick="speak(this.dataset.t)" data-t="'+t.eg[0].replace(/['"]/g,' ')+'">🔊 Nghe ví dụ</button></div></div>';
}
function renderEx(ex){
  const items=ex.items.map(function(it,i){
    const w=ex.type==='fill'?'200px':'100%';
    const ph=ex.type==='fill'?'…':'Write here…';
    const inp='<input class="fi" id="inp-'+it.id+'" placeholder="'+ph+'" style="width:'+w+'" autocomplete="off">';
    const hint=it.hint?'<span style="font-size:11px;color:var(--muted)">'+it.hint+'</span>':'';
    const pre=it.pre?it.pre+' ':'';
    const suf=it.suf||'';
    return '<div class="it" id="card-'+it.id+'"><div class="in">'+(i+1)+' '+hint+'</div><div class="is">'+pre+inp+' '+suf+'</div><div class="fb" id="fb-'+it.id+'"><span class="fb-i" id="fi-'+it.id+'"></span><div class="fb-b"><div class="fb-a" id="fa-'+it.id+'"></div><div class="fb-e" id="fe-'+it.id+'"></div></div></div></div>';
  }).join('');
  return '<div class="eb"><div class="eh"><span class="ebg">'+ex.id+'</span><div><div class="etl">'+ex.title+'</div><div class="ei">'+ex.instr+'</div></div></div><div class="ebody">'+items+'</div></div>';
}
function build(){
  const score='<div class="acts"><button class="bck" onclick="checkAll()">Chấm điểm</button><button class="brs" onclick="resetAll()">Làm lại</button></div><div class="sc" id="sc"><div class="sp" id="sp">—</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div><div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">Đúng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">Tổng</div></div></div><div class="dn" id="dn">✓ Đã lưu tiến độ Unit '+UNIT+'!</div><div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">Làm lại</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">← Về trang chủ</a></div></div>';
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+score;
}
function checkAll(){
  let ok=0,total=0;
  DATA.exs.forEach(function(ex){ex.items.forEach(function(it){
    total++;const v=norm(document.getElementById('inp-'+it.id).value);const a=norm(it.ans);
    const vars=[a,a.replace("haven't","have not"),a.replace("hasn't","has not"),a.replace("'ve"," have"),a.replace("'s"," has"),a.replace("'m"," am"),a.replace("'re"," are"),a.replace("isn't","is not"),a.replace("wasn't","was not"),a.replace("didn't","did not"),a.replace("don't","do not"),a.replace("doesn't","does not"),a.replace("I've","I have"),a.replace("She's","She has"),a.replace("He's","He has"),a.replace("It's","It has")];
    const correct=vars.some(function(x){return v===x;});if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  });});
  const pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';document.getElementById('so').textContent=ok;document.getElementById('sng').textContent=total-ok;document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Xem lại lý thuyết rồi thử lại!';
  document.getElementById('sc').className='sc show';
  try{const d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&!d.includes(UNIT)){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){const b=document.getElementById('tB');const a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();
</script></body></html>
