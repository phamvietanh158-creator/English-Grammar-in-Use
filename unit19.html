<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unit 19 · Present tenses for the future</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.nb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}.nt{font-size:14px;font-weight:600}.ns{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.tb{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.th{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}.thl{font-size:14px;font-weight:600;color:var(--accent-text)}
.td{padding:0 1.25rem 1.25rem;display:none}.td.open{display:block}
.td h3{font-size:14px;font-weight:600;color:var(--accent-text);margin:1rem 0 .4rem}.td p{font-size:14px;margin-bottom:.5rem}
.eg{background:var(--surface);border-left:3px solid var(--accent);padding:.4rem .8rem;border-radius:0 var(--radius) var(--radius) 0;font-size:13.5px;margin:.3rem 0}.eg em{color:var(--muted);font-size:12px;font-style:normal}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:.75rem 0}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem}
.cc h4{font-size:13px;font-weight:700;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:2px solid var(--accent);color:var(--accent-text)}
.sb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);margin-top:.5rem}.sb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.eb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.eh{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.75rem}
.ebg{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--accent-border);white-space:nowrap;margin-top:1px}
.etl{font-size:14px;font-weight:600}.ei{font-size:13px;color:var(--muted);margin-top:3px}.ebody{padding:1rem 1.25rem}
.it{padding:.75rem 0;border-bottom:1px solid var(--border)}.it:last-child{border-bottom:none;padding-bottom:0}
.in{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}.is{font-size:14.5px;line-height:1.65}
.fi{border:none;border-bottom:2px solid var(--accent-border);background:transparent;color:var(--text);font-size:14.5px;font-family:var(--font);padding:1px 4px;width:190px;outline:none;transition:border-color .2s;vertical-align:middle}
.fi:focus{border-bottom-color:var(--accent)}.fi.ok{border-bottom-color:var(--ok);color:var(--ok);font-weight:600}.fi.ng{border-bottom-color:var(--ng);color:var(--ng)}
.fb{margin-top:.5rem;font-size:13px;display:none;gap:6px;align-items:flex-start}.fb.show{display:flex}.fb-i{font-size:15px;flex-shrink:0}.fb.ok .fb-b{color:#1a6b42}.fb.ng .fb-b{color:#991b1b}.fb-a{font-weight:600;margin-bottom:2px}.fb-e{color:var(--muted);font-size:12px}
.acts{display:flex;gap:.75rem;margin:1.5rem 0 1rem}.bck{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}.bck:hover{opacity:.85}
.brs{padding:9px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:var(--font)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;display:none}.sc.show{display:block}
.sp{font-size:48px;font-weight:700;color:var(--accent)}.sm{font-size:14px;color:var(--muted);margin-top:4px}.ss{font-size:32px;margin:.75rem 0}
.sr{display:flex;justify-content:center;gap:2rem;margin-top:.75rem}.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:var(--muted)}.ok-c{color:var(--ok)}.ng-c{color:var(--ng)}
.dn{background:#eefaf4;border:1px solid #a8ddc2;border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:#1a6b42;margin-top:.75rem;display:none}</style></head><body>
<nav><a href="index.html" class="nb">← Trang chủ</a><div class="nt">Unit 19 · Present tenses for the future</div><div class="ns">4 exercises · 24 items</div></nav>
<div class="wrap" id="app"></div>
<script>const UNIT=19;
const DATA={
theory:{title:"Present tenses (am doing / do) for the future",
compare:[
  {h:"Present Continuous → kế hoạch đã sắp xếp",items:[
    "I'<strong>m going</strong> to the cinema tonight. <em>(đã quyết định, có thể đã đặt vé)</em>",
    "What <strong>are</strong> you <strong>doing</strong> on Saturday evening? <em>(not 'What will you do')</em>",
    "Alex <strong>is getting</strong> married next month. <em>(đã lên kế hoạch)</em>",
    "I'<strong>m not working</strong> tomorrow. It's a public holiday.",
  ]},
  {h:"Present Simple → lịch trình cố định (tàu xe, phim, chương trình)",items:[
    "My train <strong>leaves</strong> at 11.30. <em>(lịch trình tàu)</em>",
    "What time <strong>does</strong> the film <strong>start</strong> tonight?",
    "The meeting <strong>is</strong> at nine o'clock tomorrow.",
    "I <strong>start</strong> my new job on Monday. <em>(cố định như lịch trình)</em>",
  ]},
],
sections:[
  {h:"Phân biệt",items:[
    "What time <strong>are</strong> you <strong>arriving</strong>? <em>(kế hoạch cá nhân → Continuous)</em>",
    "What time <strong>does</strong> the train <strong>arrive</strong>? <em>(lịch tàu → Simple)</em>",
    "I'<strong>m going</strong> to the cinema this evening. <em>vs</em> The film <strong>starts</strong> at 8.15.",
  ]},
],
eg:["What are you doing tonight?","My train leaves at 11.30.","Alex is getting married next month."]},
exs:[
  {id:"19.1",title:"Write questions to ask Anna about her holiday plans",instr:"Dùng Present Continuous",type:"full",items:[
    {id:"a191",context:"Anna is going to Scotland for ten days.",hint:"(where / go?)",pre:"",suf:"",ans:"Where are you going?",exp:"Hỏi kế hoạch → are + you + going?"},
    {id:"b191",context:"",hint:"(how long / go for?)",pre:"",suf:"",ans:"How long are you going for?",exp:"How long + are + you + going for?"},
    {id:"c191",context:"",hint:"(when / leave?)",pre:"",suf:"",ans:"When are you leaving?",exp:"When + are + you + leaving?"},
    {id:"d191",context:"",hint:"(go / alone?)",pre:"",suf:"",ans:"Are you going alone?",exp:"Are + you + going + alone?"},
    {id:"e191",context:"",hint:"(travel / by car?)",pre:"",suf:"",ans:"Are you travelling by car?",exp:"Are + you + travelling?"},
    {id:"f191",context:"",hint:"(where / stay?)",pre:"",suf:"",ans:"Where are you staying?",exp:"Where + are + you + staying?"},
  ]},
  {id:"19.2",title:"Complete the sentences using present continuous",instr:"Dùng dạng đúng theo ngữ cảnh",type:"fill",items:[
    {id:"a192",pre:"2 We",suf:"a party next week. We've invited all our friends.",hint:"have",ans:"are having",exp:"Kế hoạch đã lên → are having"},
    {id:"b192",pre:"3 I",suf:"tomorrow. It's a public holiday.",hint:"not/work",ans:"am not working",exp:"Kế hoạch → am not working"},
    {id:"c192",pre:"4 I",suf:"now. I've come to say goodbye.",hint:"leave",ans:"am leaving",exp:"Verb of movement chuẩn bị rời → am leaving"},
    {id:"d192",pre:"5 What time",suf:"out this evening?",hint:"you/go",ans:"are you going",exp:"Kế hoạch cá nhân → are you going"},
    {id:"e192",pre:"6 Laura",suf:"to the party tomorrow. She isn't well.",hint:"not/come",ans:"isn't coming",exp:"Kế hoạch phủ định → isn't coming"},
    {id:"f192",pre:"7 I love New York. I",suf:"there soon.",hint:"go",ans:"am going",exp:"Kế hoạch đã quyết → am going"},
    {id:"g192",pre:"8 Ben can't meet us on Monday. He",suf:"late.",hint:"work",ans:"is working",exp:"Kế hoạch của Ben → is working"},
  ]},
  {id:"19.4",title:"Present continuous or present simple?",instr:"Kế hoạch cá nhân → Continuous / Lịch trình cố định → Simple",type:"fill",items:[
    {id:"a194",pre:"2 Are",suf:"to Sam's party on Saturday?",hint:"you/go",ans:"you going",exp:"Kế hoạch cá nhân → are you going"},
    {id:"b194",pre:"3 He",suf:"soon – probably at end of month.",hint:"move",ans:"is moving",exp:"Kế hoạch → is moving"},
    {id:"c194",pre:"4 I'm going to a concert tonight. What time",suf:"?",hint:"it/start",ans:"does it start",exp:"Giờ bắt đầu buổi hòa nhạc = lịch trình → does it start"},
    {id:"d194",pre:"5 We",suf:"for lunch next week.",hint:"meet",ans:"are meeting",exp:"Kế hoạch đã hẹn → are meeting"},
    {id:"e194",pre:"6 Are you",suf:"anything tomorrow morning?",hint:"do",ans:"doing",exp:"Hỏi kế hoạch → are you doing"},
    {id:"f194",pre:"7 When",suf:"? (this term)",hint:"end",ans:"does this term end",exp:"Lịch học kỳ = lịch trình → does ... end"},
    {id:"g194",pre:"7b Next term",suf:"four weeks after that.",hint:"start",ans:"starts",exp:"Lịch trình → starts"},
    {id:"h194",pre:"10 My train",suf:"at 9.35 and",hint:"leave",ans:"leaves",exp:"Lịch tàu → leaves (Simple)"},
    {id:"i194",pre:"10b it",suf:"at 12.47.",hint:"arrive",ans:"arrives",exp:"Lịch tàu → arrives (Simple)"},
    {id:"j194",pre:"11 The exhibition",suf:"next week.",hint:"finish",ans:"finishes",exp:"Lịch trình → finishes"},
    {id:"k194",pre:"12 I",suf:"it this evening.",hint:"not/use",ans:"am not using",exp:"Kế hoạch phủ định → am not using"},
  ]},
]};


function norm(s){return s.trim().toLowerCase().replace(/['\u2019]/g,"'").replace(/\s+/g,' ');}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  var fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'OK \u2713':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  var t=DATA.theory;
  var secs=(t.sections||[]).map(function(s){return '<h3>'+s.h+'</h3>'+s.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('');}).join('');
  var cmp='';
  if(t.compare){cmp='<div class="cg">'+t.compare.map(function(c){return '<div class="cc"><h4>'+c.h+'</h4>'+c.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('')+'</div>';}).join('')+'</div>';}
  var egs=(t.eg||[]).map(function(e){return '<div class="eg">'+e+'</div>';}).join('');
  return '<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">\uD83D\uDCDA L\xfd thuy\u1EBFt: '+t.title+'</span><svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div><div class="td open" id="tB">'+secs+cmp+'<h3>V\xED d\u1EE5 t\u1EEB s\xE1ch</h3>'+egs+'<button class="sb" onclick="speak(this.dataset.eg)" data-eg="'+(t.eg&&t.eg[0]?t.eg[0].replace(/['"<>]/g,' '):'')+'">🔊 Nghe v\xED d\u1EE5</button></div></div>';
}
function renderEx(ex){
  var items=ex.items.map(function(it,i){
    var w=ex.type==='fill'?'180px':'100%';var mw=ex.type==='fill'?'':'max-width:500px;';
    var ph=ex.type==='fill'?'\u2026':'Write here\u2026';
    var inp='<input class="fi" id="inp-'+it.id+'" placeholder="'+ph+'" style="width:'+w+';'+mw+'" autocomplete="off">';
    var hint=it.hint?'<span style="font-size:11px;color:var(--muted)">'+it.hint+'</span>':'';
    var ctx=it.context?'<div style="font-size:13px;color:var(--muted);margin-bottom:4px">'+it.context+'</div>':'';
    var pre=it.pre?(it.pre+' '):'';var suf=it.suf||'';
    return '<div class="it" id="card-'+it.id+'"><div class="in">'+(i+1)+' '+hint+'</div>'+ctx+'<div class="is">'+pre+inp+' '+suf+'</div><div class="fb" id="fb-'+it.id+'"><span class="fb-i" id="fi-'+it.id+'"></span><div class="fb-b"><div class="fb-a" id="fa-'+it.id+'"></div><div class="fb-e" id="fe-'+it.id+'"></div></div></div></div>';
  }).join('');
  return '<div class="eb"><div class="eh"><span class="ebg">'+ex.id+'</span><div><div class="etl">'+ex.title+'</div><div class="ei">'+ex.instr+'</div></div></div><div class="ebody">'+items+'</div></div>';
}
function build(){
  var score='<div class="acts"><button class="bck" onclick="checkAll()">\u2714 Ch\u1EA5m \u0111i\u1EC3m</button><button class="brs" onclick="resetAll()">L\xE0m l\u1EA1i</button></div><div class="sc" id="sc"><div class="sp" id="sp">\u2014</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div><div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">\u0110\xFAng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">T\u1ED5ng</div></div></div><div class="dn" id="dn">\u2713 \u0110\xE3 l\u01B0u ti\u1EBFn \u0111\u1ED9 Unit '+UNIT+'!</div><div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">L\xE0m l\u1EA1i</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">\u2190 V\u1EC1 trang ch\u1EE7</a></div></div>';
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+score;
}
function checkAll(){
  var ok=0,total=0;
  DATA.exs.forEach(function(ex){ex.items.forEach(function(it){
    total++;var v=norm(document.getElementById('inp-'+it.id).value);var a=norm(it.ans);
    var alts=(it.alts||[]).map(norm);
    var vars=[a,a.replace("haven't","have not"),a.replace("hasn't","has not"),a.replace("didn't","did not"),a.replace("wasn't","was not"),a.replace("weren't","were not"),a.replace("don't","do not"),a.replace("doesn't","does not"),a.replace("'ve"," have"),a.replace("'s"," has"),a.replace("'d"," had"),a.replace("'m"," am"),a.replace("'re"," are"),a.replace("hadn't","had not"),a.replace("isn't","is not"),a.replace("aren't","are not"),a.replace("couldn't","could not"),a.replace("won't","will not"),a.replace("i'm","i am"),a.replace("i've","i have"),a.replace("i'd","i had")].concat(alts);
    var correct=vars.some(function(x){return v===x;});
    if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  });});
  var pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';document.getElementById('so').textContent=ok;document.getElementById('sng').textContent=total-ok;document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Xem lại lý thuyết rồi thử lại!';
  document.getElementById('sc').className='sc show';
  try{var d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&d.indexOf(UNIT)===-1){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){var b=document.getElementById('tB');var a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();
</script></body></html>
