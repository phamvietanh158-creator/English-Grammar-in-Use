<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unit 21 · will and shall 1</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.nb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}.nt{font-size:14px;font-weight:600}.ns{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.tb{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.th{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}.thl{font-size:14px;font-weight:600;color:var(--accent-text)}
.td{padding:0 1.25rem 1.25rem;display:none}.td.open{display:block}
.td h3{font-size:14px;font-weight:600;color:var(--accent-text);margin:1rem 0 .4rem}
.eg{background:var(--surface);border-left:3px solid var(--accent);padding:.4rem .8rem;border-radius:0 var(--radius) var(--radius) 0;font-size:13.5px;margin:.3rem 0}.eg em{color:var(--muted);font-size:12px;font-style:normal}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:.75rem 0}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem}
.cc h4{font-size:13px;font-weight:700;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:2px solid var(--accent);color:var(--accent-text)}
.sb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);margin-top:.5rem}.sb:hover{border-color:var(--accent);color:var(--accent)}
.eb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.eh{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.75rem}
.ebg{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--accent-border);white-space:nowrap;margin-top:1px}
.etl{font-size:14px;font-weight:600}.ei{font-size:13px;color:var(--muted);margin-top:3px}.ebody{padding:1rem 1.25rem}
.it{padding:.75rem 0;border-bottom:1px solid var(--border)}.it:last-child{border-bottom:none;padding-bottom:0}
.in{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}.is{font-size:14.5px;line-height:1.65}
.fi{border:none;border-bottom:2px solid var(--accent-border);background:transparent;color:var(--text);font-size:14.5px;font-family:var(--font);padding:1px 4px;width:200px;outline:none;transition:border-color .2s;vertical-align:middle}
.fi:focus{border-bottom-color:var(--accent)}.fi.ok{border-bottom-color:var(--ok);color:var(--ok);font-weight:600}.fi.ng{border-bottom-color:var(--ng);color:var(--ng)}
.fb{margin-top:.5rem;font-size:13px;display:none;gap:6px;align-items:flex-start}.fb.show{display:flex}.fb-i{font-size:15px;flex-shrink:0}.fb.ok .fb-b{color:#1a6b42}.fb.ng .fb-b{color:#991b1b}.fb-a{font-weight:600;margin-bottom:2px}.fb-e{color:var(--muted);font-size:12px}
.acts{display:flex;gap:.75rem;margin:1.5rem 0 1rem}.bck{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}.bck:hover{opacity:.85}
.brs{padding:9px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:var(--font)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;display:none}.sc.show{display:block}
.sp{font-size:48px;font-weight:700;color:var(--accent)}.sm{font-size:14px;color:var(--muted);margin-top:4px}.ss{font-size:32px;margin:.75rem 0}
.sr{display:flex;justify-content:center;gap:2rem;margin-top:.75rem}.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:var(--muted)}.ok-c{color:var(--ok)}.ng-c{color:var(--ng)}
.dn{background:#eefaf4;border:1px solid #a8ddc2;border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:#1a6b42;margin-top:.75rem;display:none}</style></head><body>
<nav><a href="index.html" class="nb">← Trang chủ</a><div class="nt">Unit 21 · will and shall 1</div><div class="ns">4 exercises · 25 items</div></nav>
<div class="wrap" id="app"></div>
<script>const UNIT=21;
const DATA={
theory:{title:"will / shall 1 — quyết định tức thì, đề nghị, lời hứa, từ chối",
sections:[
  {h:"A · I'll = quyết định ngay lúc nói (not a previous plan)",items:[
    "Oh, I left the door open. <strong>I'll go</strong> and shut it. <em>(quyết định ngay)</em>",
    "'What would you like to drink?' '<strong>I'll have</strong> orange juice, please.'",
    "I think <strong>I'll have</strong> something to eat. <em>(I think I'll...)</em>",
    "I <strong>don't think I'll go</strong> out tonight. I'm too tired.",
  ]},
  {h:"B · Dùng I'll để: đề nghị / đồng ý / hứa",items:[
    "Đề nghị: That bag looks heavy. <strong>I'll help</strong> you. <em>(not I help)</em>",
    "Đồng ý: 'Can you give Tom this book?' 'Sure, <strong>I'll give</strong> it to him.'",
    "Hứa: Thanks for the money. <strong>I'll pay</strong> you back on Friday.",
    "<strong>won't</strong> = từ chối: She <strong>won't listen</strong>. The car <strong>won't start</strong>.",
  ]},
  {h:"C · Will you ...? = nhờ ai làm gì",items:[
    "<strong>Will you</strong> please turn the music down? It's too loud.",
    "⚠️ Không dùng will cho kế hoạch đã quyết định trước: I'<strong>m going</strong> on holiday next Saturday. <em>(not I'll go)</em>",
  ]},
  {h:"D · Shall I/we? = hỏi ý kiến / gợi ý",items:[
    "<strong>Shall I</strong> open the window? <em>(= do you want me to?)</em>",
    "I've got no money. What <strong>shall I</strong> do? <em>(= what do you suggest?)</em>",
    "'<strong>Shall we go?</strong>' 'Just a minute. I'm not ready yet.'",
    "Where <strong>shall we</strong> have lunch? 'Let's go to Marino's.'",
  ]},
],eg:["I'll call him now.","That bag looks heavy. I'll help you.","Shall I open the window?"]},
exs:[
  {id:"21.1",title:"Complete with I'll + a suitable verb",instr:"Điền I'll + động từ phù hợp",type:"fill",items:[
    {id:"a211",pre:"2 'It's cold in this room.' 'Is it?",suf:"on the heating then.'",ans:"I'll put",exp:"Quyết định ngay → I'll put on the heating"},
    {id:"b211",pre:"3 'Are you free next Friday?' 'Let me see.",suf:"my diary.'",ans:"I'll check",exp:"Quyết định ngay → I'll check"},
    {id:"c211",pre:"4 'Shall I do the washing-up?' 'No, it's all right.",suf:"it later.'",ans:"I'll do",exp:"Đề nghị tự làm → I'll do it"},
    {id:"d211",pre:"5 'I don't know how to use this phone.' 'OK,",suf:"you.'",ans:"I'll show",exp:"Đề nghị giúp đỡ → I'll show"},
    {id:"e211",pre:"6 'Would you like tea or coffee?'",suf:"coffee, please.'",ans:"I'll have",exp:"Chọn ngay → I'll have"},
    {id:"f211",pre:"7 'Are you coming with us?' 'No, I think",suf:"here.'",ans:"I'll stay",exp:"I think I'll... = quyết định ngay"},
    {id:"g211",pre:"8 'Can you finish this report today?' 'Well,",suf:", but I can't promise.'",ans:"I'll try",exp:"Đồng ý cố gắng → I'll try"},
  ]},
  {id:"21.2",title:"Write sentences with I think I'll ... or I don't think I'll ...",instr:"Viết câu theo tình huống",type:"full",items:[
    {id:"a212",context:"2 You are tired and it's getting late. You decide to go to bed.",pre:"",suf:"",ans:"I think I'll go to bed.",exp:"I think I'll + quyết định ngay"},
    {id:"b212",context:"3 The weather is nice. You decide to go for a walk.",pre:"",suf:"",ans:"I think I'll go for a walk.",exp:"I think I'll go for a walk"},
    {id:"c212",context:"4 You were going to have lunch but now decide not to.",pre:"",suf:"",ans:"I don't think I'll have lunch.",exp:"I don't think I'll = quyết định không làm"},
    {id:"d212",context:"5 You planned to go swimming but now decide not to.",pre:"",suf:"",ans:"I don't think I'll go swimming today.",exp:"I don't think I'll go swimming"},
  ]},
  {id:"21.3",title:"Which is correct?",instr:"Gõ dạng đúng: I'll ... / I'm ... / won't / etc.",type:"full",items:[
    {id:"a213",context:"2 I can't meet you tomorrow morning.",pre:"A: I'm playing  B: I'll play",suf:"tennis. (chọn A hoặc B)",ans:"A",exp:"Kế hoạch đã có → I'm playing (Present Continuous)"},
    {id:"b213",context:"3 We need to decide where to meet tomorrow.",pre:"A: I'll meet  B: I meet",suf:"you outside the hotel at 10.30.",ans:"A",exp:"Quyết định ngay lúc nói → I'll meet"},
    {id:"c213",context:"4 'Please don't go yet.'",pre:"A: I'm staying  B: I'll stay",suf:"a little longer.",ans:"B",exp:"Quyết định ở lại ngay → I'll stay"},
    {id:"d213",context:"5 I have a party planned.",pre:"A: I'm having  B: I'll have",suf:"a party next Saturday.",ans:"A",exp:"Kế hoạch đã lên trước → I'm having"},
    {id:"e213",context:"6 'Remember to lock the door.'",pre:"A: I don't forget  B: I won't forget",suf:"",ans:"B",exp:"Lời hứa → I won't forget"},
    {id:"f213",context:"7 We have plans for the weekend.",pre:"A: we're going  B: we'll go",suf:"to a wedding.",ans:"A",exp:"Kế hoạch đã lên → we're going"},
    {id:"g213",context:"11 I asked Sue what happened, but",pre:"A: she doesn't tell  B: she won't tell",suf:"me.",ans:"B",exp:"won't = từ chối nói"},
  ]},
  {id:"21.4",title:"Write sentences with shall I...? or shall we...?",instr:"Hỏi ý kiến hoặc gợi ý",type:"full",items:[
    {id:"a214",context:"2 You want to phone but are not sure if it's a good time.",pre:"",suf:"",ans:"Shall I phone now?",exp:"Shall I + V? = hỏi có nên làm không"},
    {id:"b214",context:"3 You try on a jacket. Ask a friend for advice.",pre:"",suf:"",ans:"Shall I buy it?",exp:"Shall I buy it? = xin ý kiến"},
    {id:"c214",context:"4 You and a friend need to decide: taxi or walk?",pre:"",suf:"",ans:"Shall we get a taxi or shall we walk?",exp:"Shall we ...? = hỏi ý kiến cùng nhau"},
    {id:"d214",context:"5 It's Helen's birthday. What should you get her?",pre:"",suf:"",ans:"What shall I get her?",exp:"What shall I get? = xin gợi ý"},
    {id:"e214",context:"6 You're meeting a friend. Need to decide what time.",pre:"",suf:"",ans:"What time shall we meet?",exp:"What time shall we...? = gợi ý giờ"},
  ]},
]};

function norm(s){return s.trim().toLowerCase().replace(/['\u2019]/g,"'").replace(/\s+/g,' ');}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  var fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'✓':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  var t=DATA.theory;
  var secs=(t.sections||[]).map(function(s){return '<h3>'+s.h+'</h3>'+s.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('');}).join('');
  var cmp='';
  if(t.compare){cmp='<div class="cg">'+t.compare.map(function(c){return '<div class="cc"><h4>'+c.h+'</h4>'+c.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('')+'</div>';}).join('')+'</div>';}
  var egs=(t.eg||[]).map(function(e){return '<div class="eg">'+e+'</div>';}).join('');
  var spk=t.eg&&t.eg[0]?t.eg[0].replace(/['"<>&]/g,' '):'';
  return '<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">\uD83D\uDCDA L\xFD thuy\u1EBFt: '+t.title+'</span><svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div><div class="td open" id="tB">'+secs+cmp+'<h3>V\xED d\u1EE5 t\u1EEB s\xE1ch</h3>'+egs+'<button class="sb" onclick="speak(\''+spk+'\')">&#128266; Nghe v\xED d\u1EE5</button></div></div>';
}
function renderEx(ex){
  var items=ex.items.map(function(it,i){
    var w=ex.type==='fill'?'190px':'100%';var mw=ex.type==='fill'?'':'max-width:500px;';
    var inp='<input class="fi" id="inp-'+it.id+'" placeholder="'+(ex.type==='fill'?'\u2026':'Write\u2026')+'" style="width:'+w+';'+mw+'" autocomplete="off">';
    var ctx=it.context?'<div style="font-size:13px;color:var(--muted);margin-bottom:4px">'+it.context+'</div>':'';
    var hint=it.hint?'<span style="font-size:11px;color:var(--muted)"> '+it.hint+'</span>':'';
    return '<div class="it" id="card-'+it.id+'"><div class="in">'+(i+1)+hint+'</div>'+ctx+'<div class="is">'+(it.pre?it.pre+' ':'')+inp+' '+(it.suf||'')+'</div><div class="fb" id="fb-'+it.id+'"><span class="fb-i" id="fi-'+it.id+'"></span><div class="fb-b"><div class="fb-a" id="fa-'+it.id+'"></div><div class="fb-e" id="fe-'+it.id+'"></div></div></div></div>';
  }).join('');
  return '<div class="eb"><div class="eh"><span class="ebg">'+ex.id+'</span><div><div class="etl">'+ex.title+'</div><div class="ei">'+ex.instr+'</div></div></div><div class="ebody">'+items+'</div></div>';
}
function build(){
  var sc='<div class="acts"><button class="bck" onclick="checkAll()">\u2714 Ch\u1EA5m \u0111i\u1EC3m</button><button class="brs" onclick="resetAll()">L\xE0m l\u1EA1i</button></div><div class="sc" id="sc"><div class="sp" id="sp">\u2014</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div><div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">\u0110\xFAng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">T\u1ED5ng</div></div></div><div class="dn" id="dn">\u2713 \u0110\xE3 l\u01B0u Unit '+UNIT+'!</div><div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">L\xE0m l\u1EA1i</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">\u2190 Trang ch\u1EE7</a></div></div>';
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+sc;
}
function checkAll(){
  var ok=0,total=0;
  DATA.exs.forEach(function(ex){ex.items.forEach(function(it){
    total++;var v=norm(document.getElementById('inp-'+it.id).value);var a=norm(it.ans);
    var alts=(it.alts||[]).map(norm);
    var vars=[a,a.replace("won't","will not"),a.replace("can't","cannot"),a.replace("couldn't","could not"),a.replace("mustn't","must not"),a.replace("haven't","have not"),a.replace("hasn't","has not"),a.replace("didn't","did not"),a.replace("don't","do not"),a.replace("doesn't","does not"),a.replace("isn't","is not"),a.replace("aren't","are not"),a.replace("wasn't","was not"),a.replace("weren't","were not"),a.replace("mightn't","might not"),a.replace("'ll"," will"),a.replace("'ve"," have"),a.replace("'s"," is"),a.replace("'d"," had"),a.replace("'m"," am"),a.replace("'re"," are"),a.replace("hadn't","had not"),a.replace("shouldn't","should not"),a.replace("wouldn't","would not")].concat(alts);
    var correct=vars.some(function(x){return v===x;});
    if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  });});
  var pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';document.getElementById('so').textContent=ok;document.getElementById('sng').textContent=total-ok;document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Xem lại lý thuyết rồi thử lại!';
  document.getElementById('sc').className='sc show';
  try{var d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&d.indexOf(UNIT)===-1){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){var b=document.getElementById('tB');var a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();
</script></body></html>
