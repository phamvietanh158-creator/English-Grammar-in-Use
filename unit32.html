<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unit 32 · must mustn't needn't</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}

<nav><a href="index.html" class="nb">← Trang chủ</a><div class="nt">Unit 32 · must mustn't needn't</div><div class="ns">5 exercises · 23 items</div></nav>
<div class="wrap" id="app"></div>
<script>const UNIT=32;
const DATA={
theory:{title:"must / mustn't / needn't — bắt buộc / cấm / không cần",
compare:[
  {h:"must vs mustn't",items:[
    "<strong>must</strong> = bắt buộc làm: We <strong>must</strong> hurry. We don't have much time.",
    "<strong>mustn't</strong> = cấm, không được: You <strong>mustn't</strong> tell anyone. <em>(= don't tell)</em>",
    "We must be very quiet. We <strong>mustn't</strong> make any noise.",
  ]},
  {h:"needn't / don't need to — không cần thiết",items:[
    "We have plenty of time. We <strong>needn't</strong> hurry. <em>(= don't need to hurry)</em>",
    "Joe can stay here. He <strong>needn't</strong> come with us.",
    "⚠️ needn't do <em>(no to)</em> vs don't need <strong>to</strong> do",
    "<strong>mustn't</strong> vs <strong>needn't</strong>: You <strong>needn't</strong> tell Steve. <em>(not necessary)</em> / You <strong>mustn't</strong> tell Steve. <em>(don't tell him!)</em>",
  ]},
],
sections:[
  {h:"C · needn't have (done) — đã làm nhưng không cần thiết",items:[
    "They <strong>needn't have reserved</strong> a table. <em>(= they reserved it, but it wasn't necessary)</em>",
    "You needn't have <strong>worried</strong>. Everything was OK.",
    "⚠️ needn't have done ≠ didn't need to do:",
    "He <strong>needn't have got up</strong> early. <em>(he got up, but it wasn't necessary)</em>",
    "He <strong>didn't need to get up</strong> early, so he didn't. <em>(or he did — we don't know)</em>",
  ]},
],
eg:["You mustn't tell anyone — keep it a secret.","We needn't hurry — we have plenty of time.","They needn't have reserved a table — it was empty."]},
exs:[
  {id:"32.1",title:"Match — find sentences with similar meaning (write the letter)",instr:"Nối must → mustn't có nghĩa tương đương",type:"fill",items:[
    {id:"a321",context:"2 You must remember your password.",pre:"→",suf:"",ans:"d",exp:"d: You mustn't forget it."},
    {id:"b321",context:"3 You must be brave.",pre:"→",suf:"",ans:"b",exp:"b: You mustn't be afraid."},
    {id:"c321",context:"4 You must be on time.",pre:"→",suf:"",ans:"e",exp:"e: You mustn't be late."},
    {id:"d321",context:"5 You must leave the furniture as it is.",pre:"→",suf:"",ans:"g",exp:"g: You mustn't move anything."},
    {id:"e321",context:"6 You must go away.",pre:"→",suf:"",ans:"a",exp:"a: You mustn't stay here."},
    {id:"f321",context:"7 You must forget what happened.",pre:"→",suf:"",ans:"c",exp:"c: You mustn't think about it."},
  ]},
  {id:"32.2",title:"Which is correct: mustn't or needn't?",instr:"Gõ mustn't hoặc needn't (hoặc don't need to)",type:"fill",items:[
    {id:"a322",pre:"2 I have to talk to Gary. I",suf:"remember to call him.",ans:"must",exp:"Tự nhắc nhở → must remember"},
    {id:"b322",pre:"3 I have to talk to Gary. I",suf:"forget to call him.",ans:"mustn't",exp:"Không được quên → mustn't"},
    {id:"c322",pre:"4 There's plenty of time. You",suf:"decide now.",ans:"don't need to",exp:"Không cần quyết định ngay → don't need to"},
    {id:"d322",pre:"5 These are important documents. We",suf:"lose them.",ans:"mustn't",exp:"Không được mất → mustn't"},
    {id:"e322",pre:"6 You",suf:"wait for me. You go on ahead.",ans:"needn't",exp:"Không cần chờ → needn't"},
    {id:"f322",pre:"7 This is dangerous. We",suf:"do anything stupid.",ans:"mustn't",exp:"Không được làm bừa → mustn't"},
    {id:"g322",pre:"8 You",suf:"explain further. I understand perfectly.",ans:"don't need to",exp:"Không cần giải thích → don't need to"},
    {id:"h322",pre:"9 It",suf:"be big — that's not so important. But it must have a nice garden.",ans:"needn't",exp:"Không cần lớn → needn't"},
  ]},
  {id:"32.3",title:"Complete using needn't + verb",instr:"Dùng: come / keep / walk / worry",type:"fill",items:[
    {id:"a323",pre:"2 I can manage alone. You",suf:"with me.",ans:"needn't come",exp:"Không cần đi cùng → needn't come"},
    {id:"b323",pre:"3 We",suf:"all the way home. We can get a taxi.",ans:"needn't walk",exp:"Không cần đi bộ → needn't walk"},
    {id:"c323",pre:"4 You can delete these emails. You",suf:"them.",ans:"needn't keep",exp:"Không cần giữ → needn't keep"},
    {id:"d323",pre:"5 I'll be all right. You",suf:"about me.",ans:"needn't worry",exp:"Không cần lo → needn't worry"},
  ]},
  {id:"32.4",title:"Write two sentences with needn't have ... and could have ...",instr:"needn't have = đã làm nhưng không cần / could have = đáng lẽ nên làm vậy",type:"full",items:[
    {id:"a324",context:"2 Why did you walk home? Why didn't you take a taxi?",pre:"",suf:"",ans:"You needn't have walked. You could have taken a taxi.",exp:"needn't have walked / could have taken"},
    {id:"b324",context:"3 Why did they stay at a hotel? Why didn't they stay with us?",pre:"",suf:"",ans:"They needn't have stayed at a hotel. They could have stayed with us.",exp:"needn't have stayed / could have stayed"},
    {id:"c324",context:"4 Why did she phone at 3am? Why didn't she wait until morning?",pre:"",suf:"",ans:"She needn't have phoned at 3am. She could have waited until morning.",exp:"needn't have phoned / could have waited"},
    {id:"d324",context:"5 Why did you shout at me? Why weren't you more patient?",pre:"",suf:"",ans:"You needn't have shouted. You could have been more patient.",exp:"needn't have shouted / could have been"},
  ]},
  {id:"32.5",title:"Are these sentences OK? Correct where necessary.",instr:"Gõ OK hoặc sửa lại",type:"full",items:[
    {id:"a325",context:"1 We have plenty of time. We don't need hurry.",pre:"",suf:"",ans:"We don't need to hurry.",exp:"don't need TO do (cần có 'to')"},
    {id:"b325",context:"2 Keep it a secret. You mustn't tell anybody.",pre:"",suf:"",ans:"OK",exp:"mustn't = cấm → OK ✓"},
    {id:"c325",context:"3 You needn't to shout. I can hear you.",pre:"",suf:"",ans:"You needn't shout.",exp:"needn't + V (không có 'to')"},
  ]},
]};

function norm(s){return s.trim().toLowerCase().replace(/['\u2019]/g,"'").replace(/\s+/g,' ');}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  var fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'✓':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  var t=DATA.theory;
  var secs=(t.sections||[]).map(function(s){return '<h3>'+s.h+'</h3>'+s.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('');}).join('');
  var cmp='';
  if(t.compare){cmp='<div class="cg">'+t.compare.map(function(c){return '<div class="cc"><h4>'+c.h+'</h4>'+c.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('')+'</div>';}).join('')+'</div>';}
  var egs=(t.eg||[]).map(function(e){return '<div class="eg">'+e+'</div>';}).join('');
  var spk=t.eg&&t.eg[0]?t.eg[0].replace(/['"<>&]/g,' '):'';
  return '<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">📖 Lý thuyết: '+t.title+'</span><svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div><div class="td open" id="tB">'+secs+cmp+'<h3>Ví dụ từ sách</h3>'+egs+'<button class="sb" onclick="speak(\''+spk+'\')">🔊 Nghe ví dụ</button></div></div>';
}
function renderEx(ex){
  var items=ex.items.map(function(it,i){
    var w=ex.type==='fill'?'190px':'100%';var mw=ex.type==='fill'?'':'max-width:500px;';
    var inp='<input class="fi" id="inp-'+it.id+'" placeholder="'+(ex.type==='fill'?'…':'Write…')+'" style="width:'+w+';'+mw+'" autocomplete="off">';
    var ctx=it.context?'<div style="font-size:13px;color:var(--muted);margin-bottom:4px">'+it.context+'</div>':'';
    var hint=it.hint?'<span style="font-size:11px;color:var(--muted)"> '+it.hint+'</span>':'';
    return '<div class="it" id="card-'+it.id+'"><div class="in">'+(i+1)+hint+'</div>'+ctx+'<div class="is">'+(it.pre?it.pre+' ':'')+inp+' '+(it.suf||'')+'</div><div class="fb" id="fb-'+it.id+'"><span class="fb-i" id="fi-'+it.id+'"></span><div class="fb-b"><div class="fb-a" id="fa-'+it.id+'"></div><div class="fb-e" id="fe-'+it.id+'"></div></div></div></div>';
  }).join('');
  return '<div class="eb"><div class="eh"><span class="ebg">'+ex.id+'</span><div><div class="etl">'+ex.title+'</div><div class="ei">'+ex.instr+'</div></div></div><div class="ebody">'+items+'</div></div>';
}
function build(){
  var sc='<div class="acts"><button class="bck" onclick="checkAll()">✔ Chấm điểm</button><button class="brs" onclick="resetAll()">Làm lại</button></div><div class="sc" id="sc"><div class="sp" id="sp">—</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div><div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">Đúng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">Tổng</div></div></div><div class="dn" id="dn">✓ Đã lưu Unit '+UNIT+'!</div><div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">Làm lại</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">← Trang chủ</a></div></div>';
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+sc;
}
function checkAll(){
  var ok=0,total=0;
  DATA.exs.forEach(function(ex){ex.items.forEach(function(it){
    total++;var v=norm(document.getElementById('inp-'+it.id).value);var a=norm(it.ans);
    var alts=(it.alts||[]).map(norm);
    var base=[a];
    var contractions={"won't":"will not","can't":"cannot","couldn't":"could not","mustn't":"must not","shouldn't":"should not","wouldn't":"would not","needn't":"need not","haven't":"have not","hasn't":"has not","didn't":"did not","don't":"do not","doesn't":"does not","isn't":"is not","aren't":"are not","wasn't":"was not","weren't":"were not","hadn't":"had not","mightn't":"might not","'ll":" will","'ve":" have","'s":" is","'d":" had","'m":" am","'re":" are","'d better":"had better"};
    var expanded=a;
    for(var k in contractions)expanded=expanded.replace(k,contractions[k]);
    if(expanded!==a)base.push(expanded);
    var vars=base.concat(alts);
    var correct=vars.some(function(x){return v===x;});
    if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  });});
  var pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';document.getElementById('so').textContent=ok;document.getElementById('sng').textContent=total-ok;document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Xem lại lý thuyết rồi thử lại!';
  document.getElementById('sc').className='sc show';
  try{var d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&d.indexOf(UNIT)===-1){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){var b=document.getElementById('tB');var a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();
</script></body></html>
