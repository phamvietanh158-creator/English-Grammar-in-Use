<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unit 13 · Present Perfect and Past 1</title>
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.nb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}.nt{font-size:14px;font-weight:600}.ns{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.tb{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.th{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}.thl{font-size:14px;font-weight:600;color:var(--accent-text)}
.td{padding:0 1.25rem 1.25rem;display:none}.td.open{display:block}
.td h3{font-size:14px;font-weight:600;color:var(--accent-text);margin:1rem 0 .4rem}.td p{font-size:14px;margin-bottom:.5rem}
.eg{background:var(--surface);border-left:3px solid var(--accent);padding:.4rem .8rem;border-radius:0 var(--radius) var(--radius) 0;font-size:13.5px;margin:.3rem 0}.eg em{color:var(--muted);font-size:12px;font-style:normal}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:.75rem 0}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem}
.cc h4{font-size:13px;font-weight:700;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:2px solid var(--accent);color:var(--accent-text)}
.sb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);margin-top:.5rem}.sb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.eb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.eh{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.75rem}
.ebg{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--accent-border);white-space:nowrap;margin-top:1px}
.etl{font-size:14px;font-weight:600}.ei{font-size:13px;color:var(--muted);margin-top:3px}.ebody{padding:1rem 1.25rem}
.it{padding:.75rem 0;border-bottom:1px solid var(--border)}.it:last-child{border-bottom:none;padding-bottom:0}
.in{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}.is{font-size:14.5px;line-height:1.65}
.fi{border:none;border-bottom:2px solid var(--accent-border);background:transparent;color:var(--text);font-size:14.5px;font-family:var(--font);padding:1px 4px;width:190px;outline:none;transition:border-color .2s;vertical-align:middle}
.fi:focus{border-bottom-color:var(--accent)}.fi.ok{border-bottom-color:var(--ok);color:var(--ok);font-weight:600}.fi.ng{border-bottom-color:var(--ng);color:var(--ng)}
.fb{margin-top:.5rem;font-size:13px;display:none;gap:6px;align-items:flex-start}.fb.show{display:flex}.fb-i{font-size:15px;flex-shrink:0}.fb.ok .fb-b{color:#1a6b42}.fb.ng .fb-b{color:#991b1b}.fb-a{font-weight:600;margin-bottom:2px}.fb-e{color:var(--muted);font-size:12px}
.acts{display:flex;gap:.75rem;margin:1.5rem 0 1rem}.bck{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}.bck:hover{opacity:.85}
.brs{padding:9px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:var(--font)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;display:none}.sc.show{display:block}
.sp{font-size:48px;font-weight:700;color:var(--accent)}.sm{font-size:14px;color:var(--muted);margin-top:4px}.ss{font-size:32px;margin:.75rem 0}
.sr{display:flex;justify-content:center;gap:2rem;margin-top:.75rem}.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:var(--muted)}.ok-c{color:var(--ok)}.ng-c{color:var(--ng)}
.dn{background:#eefaf4;border:1px solid #a8ddc2;border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:#1a6b42;margin-top:.75rem;display:none}</style>
</head>
<body>
<nav>
  <a href="index.html" class="nb">← Trang chủ</a>
  <div class="nt">Unit 13 · Present Perfect and Past 1</div>
  <div class="ns">3 exercises · 24 items</div>
</nav>
<div class="wrap" id="app"></div>
<script>
const UNIT=13;
const DATA={
theory:{
  title:"Present Perfect vs Past Simple 1 — kết nối hiện tại vs sự kiện hoàn toàn trong quá khứ",
  compare:[
    {h:"Present Perfect (has done) — kết nối với NOW",items:[
      "Tom <strong>has lost</strong> his key. <em>(he doesn't have it NOW)</em>",
      "They'<strong>ve gone</strong> away. They'll be back Friday. <em>(away NOW)</em>",
      "It <strong>has stopped</strong> raining. We don't need the umbrella. <em>(đã dừng NOW)</em>",
      "I'<strong>ve repaired</strong> the washing machine. It's working OK now.",
    ]},
    {h:"Past Simple (did) — sự kiện đã xong, không liên quan NOW",items:[
      "Tom <strong>lost</strong> his key yesterday. He <strong>couldn't</strong> get in. <em>(xong rồi)</em>",
      "They <strong>went</strong> away, but I think they're back home now.",
      "It <strong>stopped</strong> raining for a while, but now it's raining again.",
      "Mozart <strong>was</strong> a composer. He <strong>wrote</strong> 600+ pieces. <em>(not has written)</em>",
    ]},
  ],
  sections:[
    {h:"B · Tin tức mới vs sự kiện lịch sử",items:[
      "Tin tức mới/gần đây → có thể dùng cả hai: I'<strong>ve repaired</strong> it. <em>or</em> I <strong>repaired</strong> it.",
      "Sự kiện lịch sử, người đã mất → chỉ dùng Past Simple:",
      "Mozart <strong>was</strong> a composer. <em>(not 'has been')</em>",
      "Who <strong>invented</strong> the telephone? <em>(not 'has invented')</em>",
    ]},
    {h:"C · Present Perfect để giới thiệu, rồi chuyển sang Past Simple",items:[
      "A: Ow! I'<strong>ve burnt</strong> myself. <em>(giới thiệu tin mới → Perfect)</em>",
      "B: How <strong>did</strong> you do that? A: I <strong>picked up</strong> a hot dish. <em>(kể tiếp → Past Simple)</em>",
      "A: Somebody <strong>has spilt</strong> something. <em>(Perfect)</em>",
      "B: Well, it <strong>wasn't</strong> me. I <strong>didn't do</strong> it. <em>(Past Simple)</em>",
    ]},
  ],
  eg:[
    "Tom has lost his key — he doesn't have it now.",
    "Tom lost his key yesterday — he couldn't get in.",
    "Who invented the telephone?",
  ],
},
exs:[
  {id:"13.2",title:"Are the underlined parts OK? Correct where necessary.",instr:"Gõ OK hoặc dạng đúng",type:"full",items:[
    {id:"a132",context:"1 Did you hear about Sophie? She's given up her job.",pre:"",suf:"",ans:"OK",exp:"Tin tức mới → Present Perfect ✓"},
    {id:"b132",context:"2 My mother has grown up in Italy.",pre:"",suf:"",ans:"My mother grew up in Italy.",exp:"Việc đã xong trong quá khứ → Past Simple: grew up"},
    {id:"c132",context:"3 How many plays has William Shakespeare written?",pre:"",suf:"",ans:"How many plays did William Shakespeare write?",exp:"Shakespeare đã mất → Past Simple: did ... write"},
    {id:"d132",context:"4 I've forgotten his name. Is it Joe or Jack?",pre:"",suf:"",ans:"OK",exp:"Kết quả hiện tại: vẫn không nhớ → Perfect ✓"},
    {id:"e132",context:"5 Who has invented paper?",pre:"",suf:"",ans:"Who invented paper?",exp:"Lịch sử → Past Simple: invented"},
    {id:"f132",context:"6 Drugs have become a big problem everywhere.",pre:"",suf:"",ans:"OK",exp:"Vẫn là vấn đề hiện tại → Perfect ✓"},
    {id:"g132",context:"7 We've washed the car, but now it's dirty again.",pre:"",suf:"",ans:"OK",exp:"Kết quả liên quan đến hiện tại → Perfect ✓"},
    {id:"h132",context:"8 Where have you been born?",pre:"",suf:"",ans:"Where were you born?",exp:"Nơi sinh = sự kiện lịch sử cố định → Past Simple"},
    {id:"i132",context:"9 Ellie has gone shopping. She'll be back in about an hour.",pre:"",suf:"",ans:"OK",exp:"Kết quả: Ellie không có ở đây bây giờ → Perfect ✓"},
    {id:"j132",context:"10 Albert Einstein has been the scientist who has developed the theory of relativity.",pre:"",suf:"",ans:"Albert Einstein was the scientist who developed the theory of relativity.",exp:"Einstein đã mất → Past Simple: was / developed"},
  ]},
  {id:"13.3",title:"Put the verb into the correct form: present perfect or past simple",instr:"Đọc ngữ cảnh để chọn đúng dạng",type:"fill",items:[
    {id:"a133",pre:"1 It",suf:"raining for a while, but now it's raining again.",hint:"it/stop",ans:"stopped",exp:"Dừng và bắt đầu lại → sự kiện hoàn thành → Past Simple"},
    {id:"b133",pre:"2 The town is very different now. It",suf:"a lot.",hint:"it/change",ans:"has changed",exp:"Kết quả hiện tại: khác rồi → Present Perfect"},
    {id:"c133",pre:"3 I studied German at school, but I",suf:"most of it now.",hint:"I/forget",ans:"have forgotten",exp:"Vẫn không nhớ lúc này → Present Perfect"},
    {id:"d133",pre:"4 The police",suf:"three people, but later let them go.",hint:"arrest",ans:"arrested",exp:"Sự kiện hoàn toàn trong quá khứ → Past Simple"},
    {id:"e133",pre:"5 What do you think of my English? Do you think",suf:"?",hint:"it/improve",ans:"it has improved",exp:"Kết quả hiện tại → Present Perfect"},
    {id:"f133",pre:"6 Are you ready to go?",suf:"your coffee?",hint:"you/finish",ans:"Have you finished",exp:"Hỏi kết quả hiện tại → Present Perfect"},
    {id:"g133",pre:"7 I",suf="for a job as a tour guide, but I wasn't successful.",hint:"I/apply",ans:"applied",exp:"wasn't = Past → cả câu Past Simple: applied"},
    {id:"h133",pre:"8 Where's my bike? It",suf:"outside, but it's not there now.",hint:"it/be",ans:"was",exp:"Lúc trước nó ở ngoài, giờ mất → Past Simple: was"},
    {id:"i133",pre:"9 Quick! We need an ambulance.",suf:"an accident.",hint:"there/be",ans:"There has been",exp:"Tai nạn vừa xảy ra, tình huống hiện tại → Perfect"},
    {id:"j133",pre:"10 B: Where",suf:"it?",hint:"you/find",ans:"did you find",exp:"Tiếp nối sau Perfect → Past Simple: did you find"},
    {id:"k133",pre:"10 A:",suf="at the bottom of my bag.",hint:"It/be",ans:"It was",exp:"Kể tiếp → Past Simple: It was"},
    {id:"l133",pre:"11 Ben won't be able to play tennis. He",suf:"his arm.",hint:"He/break",ans:"has broken",exp:"Kết quả hiện tại: không chơi được → Perfect"},
    {id:"m133",pre:"11 B: How",suf:"?",hint:"that/happen",ans:"did that happen",exp:"Hỏi sự kiện cụ thể → Past Simple"},
    {id:"n133",pre:"11 A: He",suf:"off a ladder.",hint:"He/fall",ans:"fell",exp:"Kể lại sự kiện → Past Simple: fell"},
  ]},
]};


function norm(s){return s.trim().toLowerCase().replace(/['\u2019]/g,"'").replace(/\s+/g,' ');}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  var fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'✓':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  var t=DATA.theory;
  var secs=t.sections.map(function(s){return '<h3>'+s.h+'</h3>'+s.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('');}).join('');
  var egs=t.eg.map(function(e){return '<div class="eg">'+e+'</div>';}).join('');
  var cmp='';
  if(t.compare){cmp='<div class="cg">'+t.compare.map(function(c){return '<div class="cc"><h4>'+c.h+'</h4>'+c.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('')+'</div>';}).join('')+'</div>';}
  return '<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">📖 Lý thuyết: '+t.title+'</span><svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div><div class="td open" id="tB">'+secs+cmp+'<h3>Ví dụ từ sách</h3>'+egs+'<button class="sb" onclick="speak(\''+t.eg[0].replace(/'/g,' ')+'\')" >🔊 Nghe ví dụ</button></div></div>';
}
function renderEx(ex){
  var items=ex.items.map(function(it,i){
    var w=(ex.type==='fill')?'190px':'100%';
    var mw=(ex.type==='fill')?'':'max-width:500px;';
    var ph=(ex.type==='fill')?'…':'Write here…';
    var inp='<input class="fi" id="inp-'+it.id+'" placeholder="'+ph+'" style="width:'+w+';'+mw+'" autocomplete="off">';
    var hint=it.hint?'<span style="font-size:11px;color:var(--muted)">'+it.hint+'</span>':'';
    var pre=it.pre?(it.pre+' '):'';
    var suf=it.suf||'';
    var ctx=it.context?'<div style="font-size:13px;color:var(--muted);margin-bottom:4px">'+it.context+'</div>':'';
    return '<div class="it" id="card-'+it.id+'"><div class="in">'+(i+1)+' '+hint+'</div>'+ctx+'<div class="is">'+pre+inp+' '+suf+'</div><div class="fb" id="fb-'+it.id+'"><span class="fb-i" id="fi-'+it.id+'"></span><div class="fb-b"><div class="fb-a" id="fa-'+it.id+'"></div><div class="fb-e" id="fe-'+it.id+'"></div></div></div></div>';
  }).join('');
  return '<div class="eb"><div class="eh"><span class="ebg">'+ex.id+'</span><div><div class="etl">'+ex.title+'</div><div class="ei">'+ex.instr+'</div></div></div><div class="ebody">'+items+'</div></div>';
}
function build(){
  var score='<div class="acts"><button class="bck" onclick="checkAll()">Chấm điểm</button><button class="brs" onclick="resetAll()">Làm lại</button></div>'
    +'<div class="sc" id="sc"><div class="sp" id="sp">—</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div>'
    +'<div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">Đúng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">Tổng</div></div></div>'
    +'<div class="dn" id="dn">✓ Đã lưu tiến độ Unit '+UNIT+'!</div>'
    +'<div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">Làm lại</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">← Về trang chủ</a></div></div>';
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+score;
}
function checkAll(){
  var ok=0,total=0;
  DATA.exs.forEach(function(ex){ex.items.forEach(function(it){
    total++;
    var v=norm(document.getElementById('inp-'+it.id).value);
    var a=norm(it.ans);
    var vars=[a,
      a.replace("haven't","have not"),a.replace("hasn't","has not"),
      a.replace("didn't","did not"),a.replace("wasn't","was not"),a.replace("weren't","were not"),
      a.replace("don't","do not"),a.replace("doesn't","does not"),
      a.replace("'ve"," have"),a.replace("'s"," has"),a.replace("'d"," had"),
      a.replace("i've","i have"),a.replace("i'd","i had"),
      a.replace("hadn't","had not")];
    var correct=vars.some(function(x){return v===x;});
    if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  });});
  var pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';
  document.getElementById('so').textContent=ok;
  document.getElementById('sng').textContent=total-ok;
  document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Xem lại lý thuyết rồi thử lại!';
  document.getElementById('sc').className='sc show';
  try{var d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&d.indexOf(UNIT)===-1){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){var b=document.getElementById('tB');var a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();

</script>
</body>
</html>
