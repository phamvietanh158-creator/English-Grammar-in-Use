<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unit 42 · Passive 1 (is done / was done)</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8f7f4;--surface:#fff;--border:#e5e3de;--text:#1a1a18;--muted:#6b6960;--accent:#2d6a9f;--accent-bg:#eef4fb;--accent-border:#b8d4ee;--accent-text:#1a4a7a;--ok:#16a34a;--ng:#dc2626;--radius:10px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.nb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}.nt{font-size:14px;font-weight:600}.ns{font-size:12px;color:var(--muted);margin-left:auto}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.tb{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.th{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}.thl{font-size:14px;font-weight:600;color:var(--accent-text)}
.td{padding:0 1.25rem 1.25rem;display:none}.td.open{display:block}
.td h3{font-size:14px;font-weight:600;color:var(--accent-text);margin:1rem 0 .4rem}
.eg{background:var(--surface);border-left:3px solid var(--accent);padding:.4rem .8rem;border-radius:0 var(--radius) var(--radius) 0;font-size:13.5px;margin:.3rem 0}.eg em{color:var(--muted);font-size:12px;font-style:normal}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:.75rem 0}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem}
.cc h4{font-size:13px;font-weight:700;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:2px solid var(--accent);color:var(--accent-text)}
.sb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);margin-top:.5rem}.sb:hover{border-color:var(--accent);color:var(--accent)}
.eb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.eh{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.75rem}
.ebg{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--accent-border);white-space:nowrap;margin-top:1px}
.etl{font-size:14px;font-weight:600}.ei{font-size:13px;color:var(--muted);margin-top:3px}.ebody{padding:1rem 1.25rem}
.it{padding:.75rem 0;border-bottom:1px solid var(--border)}.it:last-child{border-bottom:none;padding-bottom:0}
.in{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}.is{font-size:14.5px;line-height:1.65}
.fi{border:none;border-bottom:2px solid var(--accent-border);background:transparent;color:var(--text);font-size:14.5px;font-family:var(--font);padding:1px 4px;width:200px;outline:none;transition:border-color .2s;vertical-align:middle}
.fi:focus{border-bottom-color:var(--accent)}.fi.ok{border-bottom-color:var(--ok);color:var(--ok);font-weight:600}.fi.ng{border-bottom-color:var(--ng);color:var(--ng)}
.fb{margin-top:.5rem;font-size:13px;display:none;gap:6px;align-items:flex-start}.fb.show{display:flex}.fb-i{font-size:15px;flex-shrink:0}.fb.ok .fb-b{color:#1a6b42}.fb.ng .fb-b{color:#991b1b}.fb-a{font-weight:600;margin-bottom:2px}.fb-e{color:var(--muted);font-size:12px}
.acts{display:flex;gap:.75rem;margin:1.5rem 0 1rem}.bck{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}.bck:hover{opacity:.85}
.brs{padding:9px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:var(--font)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;display:none}.sc.show{display:block}
.sp{font-size:48px;font-weight:700;color:var(--accent)}.sm{font-size:14px;color:var(--muted);margin-top:4px}.ss{font-size:32px;margin:.75rem 0}
.sr{display:flex;justify-content:center;gap:2rem;margin-top:.75rem}.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:var(--muted)}.ok-c{color:var(--ok)}.ng-c{color:var(--ng)}
.dn{background:#eefaf4;border:1px solid #a8ddc2;border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:#1a6b42;margin-top:.75rem;display:none}</style></head><body>
<nav><a href="index.html" class="nb">← Trang chủ</a><div class="nt">Unit 42 · Passive 1 (is done / was done)</div><div class="ns">4 exercises · 26 items</div></nav>
<div class="wrap" id="app"></div>
<script>const UNIT=42;
const DATA={
theory:{title:"Passive 1 — bị động Present Simple và Past Simple",
compare:[
  {h:"Active — chủ ngữ làm hành động",items:[
    "Somebody <strong>cleans</strong> this room every day.",
    "Somebody <strong>cleaned</strong> this room yesterday.",
    "My grandfather <strong>built</strong> this house in 1981.",
    "It's a big company. It <strong>employs</strong> 200 people.",
  ]},
  {h:"Passive — hành động xảy ra với chủ ngữ",items:[
    "This room <strong>is cleaned</strong> every day. <em>(am/is/are + V3)</em>",
    "This room <strong>was cleaned</strong> yesterday. <em>(was/were + V3)</em>",
    "This house <strong>was built</strong> in 1981.",
    "200 people <strong>are employed</strong> by the company.",
  ]},
],
sections:[
  {h:"Khi nào dùng Passive?",items:[
    "Không biết ai làm: A lot of money <strong>was stolen</strong>. <em>(don't know who)</em>",
    "Không quan trọng ai làm: <strong>Is</strong> this room <strong>cleaned</strong> every day?",
    "Dùng <strong>by</strong> khi muốn nói ai làm: built <strong>by</strong> my grandfather.",
  ]},
],
eg:["Many accidents are caused by careless driving.","This house was built in 1981.","How is this word pronounced?"]},
exs:[
  {id:"42.1",title:"Complete — present or past passive",instr:"Dùng: cause/damage/find/hold/injure/invite/make/overtake/own/send/show/surround",type:"fill",items:[
    {id:"a421",pre:"2 Cheese",suf:"from milk.",ans:"is made",exp:"is made = bị động hiện tại (sự thật)"},
    {id:"b421",pre:"3 The roof",suf:"in a storm a few days ago.",ans:"was damaged",exp:"was damaged = bị động quá khứ"},
    {id:"c421",pre:"4 A cinema is a place where films",suf:"",ans:"are shown",exp:"are shown = bị động hiện tại"},
    {id:"d421",pre:"5 You",suf:"to the party. Why didn't you go?",ans:"were invited",exp:"were invited = bị động quá khứ"},
    {id:"e421",pre:"6 This plant is rare. It",suf:"in very few places.",ans:"is found",exp:"is found = bị động hiện tại"},
    {id:"f421",pre:"7 Although we were driving fast, we",suf:"by a lot of other cars.",ans:"were overtaken",exp:"were overtaken = bị động quá khứ"},
    {id:"g421",pre:"8 In the US, elections for president",suf:"every four years.",ans:"are held",exp:"are held = bị động hiện tại"},
    {id:"h421",pre:"9 There was an accident, but fortunately nobody",suf:"",ans:"was injured",exp:"was injured = bị động quá khứ"},
    {id:"i421",pre:"10 You can't see the house. It",suf:"by trees.",ans:"is surrounded",exp:"is surrounded = bị động hiện tại"},
    {id:"j421",pre:"11 I never received the letter. It",suf:"to the wrong address.",ans:"was sent",exp:"was sent = bị động quá khứ"},
    {id:"k421",pre:"12 The company I work for",suf:"by a much larger company.",ans:"is owned",exp:"is owned = bị động hiện tại"},
  ]},
  {id:"42.2",title:"Write questions using the passive",instr:"Hỏi về các sự kiện/phát minh",type:"full",items:[
    {id:"a422",context:"2 Ask about television. (when / invent?)",pre:"",suf:"",ans:"When was television invented?",exp:"When + was + V3?"},
    {id:"b422",context:"3 Ask about mountains. (how / form?)",pre:"",suf:"",ans:"How are mountains formed?",exp:"How + are + V3?"},
    {id:"c422",context:"4 Ask about DNA. (when / discover?)",pre:"",suf:"",ans:"When was DNA discovered?",exp:"When + was + V3?"},
    {id:"d422",context:"5 Ask about silver. (what / use for?)",pre:"",suf:"",ans:"What is silver used for?",exp:"What + is + V3 + for?"},
  ]},
  {id:"42.3",title:"Active or passive? Present or past?",instr:"Điền đúng dạng — chủ động hoặc bị động",type:"fill",items:[
    {id:"a423",pre:"2a Water",suf:"most of the earth's surface.",hint:"cover",ans:"covers",exp:"Active: Water covers (chủ động)"},
    {id:"b423",pre:"2b How much of the earth's surface",suf:"by water?",hint:"cover",ans:"is covered",exp:"Passive: is covered by water"},
    {id:"c423",pre:"3a While on holiday, my camera",suf:"from my hotel room.",hint:"steal",ans:"was stolen",exp:"Passive quá khứ: was stolen"},
    {id:"d423",pre:"3b While on holiday, my camera",suf:"from my hotel room.",hint:"disappear",ans:"disappeared",exp:"Active quá khứ: disappeared"},
    {id:"e423",pre:"4b Robert and his sister",suf:"by their grandparents.",hint:"bring up",ans:"were brought up",exp:"Passive quá khứ: were brought up"},
    {id:"f423",pre:"5a The boat hit a rock and",suf:"quickly.",hint:"sink",ans:"sank",exp:"Active quá khứ: sank"},
    {id:"g423",pre:"5b Fortunately everybody",suf:"",hint:"rescue",ans:"was rescued",exp:"Passive quá khứ: was rescued"},
    {id:"h423",pre:"6a Bill",suf:"from his job.",hint:"fire",ans:"was fired",exp:"Passive quá khứ: was fired"},
  ]},
  {id:"42.4",title:"Rewrite using passive",instr:"Viết lại câu chủ động → bị động",type:"full",items:[
    {id:"a424",context:"2 They cancelled all flights because of fog.",pre:"",suf:"",ans:"All flights were cancelled because of fog.",exp:"were + cancelled (passive quá khứ)"},
    {id:"b424",context:"3 Somebody accused me of stealing money.",pre:"",suf:"",ans:"I was accused of stealing money.",exp:"was accused (passive quá khứ)"},
    {id:"c424",context:"4 How do you use this word?",pre:"",suf:"",ans:"How is this word used?",exp:"is used (passive hiện tại)"},
    {id:"d424",context:"5 The price includes all taxes.",pre:"",suf:"",ans:"All taxes are included in the price.",exp:"are included (passive hiện tại)"},
    {id:"e424",context:"6 People warned us not to go out alone.",pre:"",suf:"",ans:"We were warned not to go out alone.",exp:"were warned (passive quá khứ)"},
    {id:"f424",context:"7 We don't use this office any more.",pre:"",suf:"",ans:"This office isn't used any more.",exp:"isn't used (passive hiện tại phủ định)"},
    {id:"g424",context:"8 They invited five hundred people to the wedding.",pre:"",suf:"",ans:"Five hundred people were invited to the wedding.",exp:"were invited (passive quá khứ)"},
  ]},
]};

function norm(s){return s.trim().toLowerCase().replace(/['\u2019]/g,"'").replace(/\s+/g,' ');}
function showFb(id,ok,ans,exp){
  document.getElementById('fb-'+id).className='fb show '+(ok?'ok':'ng');
  var fi=document.getElementById('fi-'+id);if(fi)fi.textContent=ok?'✓':'✗';
  document.getElementById('fa-'+id).textContent=ok?'Đúng!':'Đáp án: '+ans;
  document.getElementById('fe-'+id).textContent=exp||'';
}
function renderTheory(){
  var t=DATA.theory;
  var secs=(t.sections||[]).map(function(s){return '<h3>'+s.h+'</h3>'+s.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('');}).join('');
  var cmp='';
  if(t.compare){cmp='<div class="cg">'+t.compare.map(function(c){return '<div class="cc"><h4>'+c.h+'</h4>'+c.items.map(function(i){return '<div class="eg">'+i+'</div>';}).join('')+'</div>';}).join('')+'</div>';}
  var egs=(t.eg||[]).map(function(e){return '<div class="eg">'+e+'</div>';}).join('');
  var spk=t.eg&&t.eg[0]?t.eg[0].replace(/['"<>&]/g,' '):'';
  return '<div class="tb"><div class="th" onclick="toggleT()"><span class="thl">📖 Lý thuyết: '+t.title+'</span><svg id="tA" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div><div class="td open" id="tB">'+secs+cmp+'<h3>Ví dụ từ sách</h3>'+egs+'<button class="sb" onclick="speak(\''+spk+'\')">🔊 Nghe ví dụ</button></div></div>';
}
function renderEx(ex){
  var items=ex.items.map(function(it,i){
    var w=ex.type==='fill'?'190px':'100%';var mw=ex.type==='fill'?'':'max-width:520px;';
    var inp='<input class="fi" id="inp-'+it.id+'" placeholder="'+(ex.type==='fill'?'…':'Write…')+'" style="width:'+w+';'+mw+'" autocomplete="off">';
    var ctx=it.context?'<div style="font-size:13px;color:var(--muted);margin-bottom:4px">'+it.context+'</div>':'';
    var hint=it.hint?'<span style="font-size:11px;color:var(--muted)"> '+it.hint+'</span>':'';
    return '<div class="it" id="card-'+it.id+'"><div class="in">'+(i+1)+hint+'</div>'+ctx+'<div class="is">'+(it.pre?it.pre+' ':'')+inp+' '+(it.suf||'')+'</div><div class="fb" id="fb-'+it.id+'"><span class="fb-i" id="fi-'+it.id+'"></span><div class="fb-b"><div class="fb-a" id="fa-'+it.id+'"></div><div class="fb-e" id="fe-'+it.id+'"></div></div></div></div>';
  }).join('');
  return '<div class="eb"><div class="eh"><span class="ebg">'+ex.id+'</span><div><div class="etl">'+ex.title+'</div><div class="ei">'+ex.instr+'</div></div></div><div class="ebody">'+items+'</div></div>';
}
function build(){
  var sc='<div class="acts"><button class="bck" onclick="checkAll()">✔ Chấm điểm</button><button class="brs" onclick="resetAll()">Làm lại</button></div><div class="sc" id="sc"><div class="sp" id="sp">—</div><div class="sm" id="sm"></div><div class="ss" id="ss"></div><div class="sr"><div><div class="sn ok-c" id="so">0</div><div class="sl">Đúng</div></div><div><div class="sn ng-c" id="sng">0</div><div class="sl">Sai</div></div><div><div class="sn" id="st">0</div><div class="sl">Tổng</div></div></div><div class="dn" id="dn">✓ Đã lưu Unit '+UNIT+'!</div><div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center"><button class="brs" onclick="resetAll()">Làm lại</button><a href="index.html" style="padding:9px 18px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">← Trang chủ</a></div></div>';
  document.getElementById('app').innerHTML=renderTheory()+DATA.exs.map(renderEx).join('')+sc;
}
function checkAll(){
  var ok=0,total=0;
  DATA.exs.forEach(function(ex){ex.items.forEach(function(it){
    total++;var v=norm(document.getElementById('inp-'+it.id).value);var a=norm(it.ans);
    var alts=(it.alts||[]).map(norm);
    var expanded=a.replace("wouldn't","would not").replace("couldn't","could not").replace("didn't","did not").replace("hadn't","had not").replace("wasn't","was not").replace("weren't","were not").replace("haven't","have not").replace("hasn't","has not").replace("won't","will not").replace("can't","cannot").replace("don't","do not").replace("doesn't","does not").replace("isn't","is not").replace("aren't","are not").replace("'d have","would have").replace("'d"," would").replace("'ve"," have").replace("'s been"," has been").replace("'s"," is").replace("'m"," am").replace("'re"," are").replace("mustn't","must not").replace("needn't","need not").replace("shouldn't","should not").replace("mightn't","might not");
    var vars=[a,expanded].concat(alts);
    var correct=vars.some(function(x){return v===x;});
    if(correct)ok++;
    document.getElementById('inp-'+it.id).className='fi '+(correct?'ok':'ng');
    showFb(it.id,correct,it.ans,it.exp);
  });});
  var pct=Math.round(ok/total*100);
  document.getElementById('sp').textContent=pct+'%';document.getElementById('so').textContent=ok;document.getElementById('sng').textContent=total-ok;document.getElementById('st').textContent=total;
  document.getElementById('ss').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('sm').textContent=pct>=90?'Xuất sắc!':pct>=70?'Khá tốt!':'Xem lại lý thuyết rồi thử lại!';
  document.getElementById('sc').className='sc show';
  try{var d=JSON.parse(localStorage.getItem('egiu_done')||'[]');if(pct>=50&&d.indexOf(UNIT)===-1){d.push(UNIT);localStorage.setItem('egiu_done',JSON.stringify(d));document.getElementById('dn').style.display='block';}}catch(e){}
  document.getElementById('sc').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetAll(){build();document.getElementById('sc').className='sc';window.scrollTo({top:0,behavior:'smooth'});}
function toggleT(){var b=document.getElementById('tB');var a=document.getElementById('tA');if(b){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'':'rotate(-90deg)';}}
function speak(t){if(!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
build();
</script></body></html>
